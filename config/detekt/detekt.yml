build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  active: true
  # El nombre correcto es 'CyclomaticComplexMethod' en versiones recientes
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  TooManyFunctions:
    active: true
    thresholdInFiles: 15
  LongMethod:
    active: true
    threshold: 60

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    active: true
  # Esta regla suele requerir la librería detekt-rules-coroutines
  # Si no la tienes, es mejor comentarla o usar 'SuspendFunWithFlow' si aplica.
  # SuspendFunWithCoroutineContext:
  #   active: true
naming:
  active: true
  FunctionNaming:
    active: true
    # Regex especial para permitir nombres de funciones con Mayúscula inicial en Compose (@Composable)
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludeClassPattern: '.*'
  VariableNaming:
    active: true
    # Permite el uso de guiones bajos para StateFlows mutables (ej: _uiState)
    variablePattern: '[a-z_][a-zA-Z0-9]*'

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '300', '500', '2000'] # Ignoramos tiempos de debounce y splash
    ignoreAnnotation: ['androidx.compose.ui.tooling.preview.Preview']
  UnusedPrivateMember:
    active: true # Vital para detectar lógica muerta que causa pantallas en blanco
  ThrowsCount:
    active: true
    max: 2

potential-bugs:
  active: true
  Deprecation:
    active: true # Te avisará de lo que pasó con el ArrowBack
  UnsafeCallOnNullableType:
    active: true # Prohíbe el uso de !! (exige safe calls o elvis operator)

# Reglas de Formato (Requiere detekt-formatting en el gradle)
formatting:
  active: true
  android: true # Aplica reglas específicas de estilo Android
  NoWildcardImports:
    active: true # Prohíbe el import .* que ensucia el código
  FinalNewline:
    active: true