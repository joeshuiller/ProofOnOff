name: Android CI Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # 1. Validación de Calidad y Tests Unitarios
  test:
    name: Run Unit Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permisos de ejecución para Gradlew
        run: chmod +x gradlew

      - name: Ejecutar Linter (Checkstyle/Detekt)
        run: ./gradlew lintDebug

      - name: Ejecutar Tests Unitarios
        run: ./gradlew testDebugUnitTest

      - name: Subir Reportes de Test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/

  # 2. Construcción del Proyecto
  build:
    name: Build Debug APK
    needs: test # Solo corre si los tests pasan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permisos de ejecución para Gradlew
        run: chmod +x gradlew

      - name: Compilar APK de Debug
        run: ./gradlew assembleDebug

      - name: Subir APK Generado
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # 3. Análisis Estático (Opcional pero Recomendado)
  static-analysis:
    name: Static Analysis
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Detekt (Kotlin Analysis)
        run: ./gradlew detekt # Requiere tener Detekt configurado en Gradle